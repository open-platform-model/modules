name: Publish Modules

on:
  push:
    branches: [main]
    paths:
      - '**/*.cue'
      - 'versions.yml'
      - '.github/workflows/publish.yml'
  workflow_dispatch:
    inputs:
      module:
        description: 'Module(s) to publish: a single name, a space-separated list, or "all"'
        required: false
        default: 'all'
        type: string
      dry_run:
        description: 'Validate only, skip publish and release'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  packages: write

env:
  # Two CUE toolchains are installed side by side. Each module is built with the
  # binary matching its cue.mod `language.version`:
  #   - STABLE (v0.16.x): modules on the opm/v1alpha1 + core/v1alpha1 catalog,
  #     whose schemas use the `div` operator (removed in v0.17-alpha).
  #   - NEXT (v0.17.0-alpha.x): modules on the catalogs/opm@v0 + core@v0 catalog,
  #     which declare language.version v0.17.0-alpha.1.
  CUE_VERSION_STABLE: 'v0.16.0'
  CUE_VERSION_NEXT: 'v0.17.0-alpha.1'
  CUE_REGISTRY: 'opmodel.dev=ghcr.io/open-platform-model,registry.cue.works'
  ORG: 'open-platform-model'
  REPO: 'modules'

jobs:
  publish:
    name: Validate, Publish, Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install yq
        run: |
          set -euo pipefail
          sudo curl -fsSL -o /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.53.2/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Install CUE toolchains (stable + next)
        run: |
          set -euo pipefail
          GOBIN="$HOME/cuebin/stable" go install "cuelang.org/go/cmd/cue@${CUE_VERSION_STABLE}"
          GOBIN="$HOME/cuebin/next"   go install "cuelang.org/go/cmd/cue@${CUE_VERSION_NEXT}"
          echo "stable: $("$HOME/cuebin/stable/cue" version | head -1)"
          echo "next:   $("$HOME/cuebin/next/cue" version | head -1)"

      - name: Discover modules
        id: discover
        run: |
          set -euo pipefail
          MODULES=""
          for dir in */; do
            name="${dir%/}"
            [ -d "${name}/cue.mod" ] || continue
            MODULES="${MODULES} ${name}"
          done
          MODULES="${MODULES# }"
          echo "modules=${MODULES}" >> "$GITHUB_OUTPUT"
          echo "Found modules: ${MODULES}"

      - name: Detect unpublished versions
        id: check
        run: |
          set -euo pipefail

          ALL_MODULES="${{ steps.discover.outputs.modules }}"
          EVENT="${{ github.event_name }}"
          SELECTED="${{ inputs.module || 'all' }}"

          version_published() {
            local repo="$1" tag="$2"
            curl -fsS --head \
              -u "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.oci.image.manifest.v1+json,*/*" \
              "https://ghcr.io/v2/${ORG}/opmodel.dev/modules/${repo}/manifests/${tag}" \
              >/dev/null 2>&1
          }

          module_major_from_cue() {
            local name="$1"
            grep -E '^module:' "${name}/cue.mod/module.cue" \
              | head -1 \
              | sed -E 's/.*@(v[0-9]+).*/\1/'
          }

          CHANGED=""
          for name in $ALL_MODULES; do
            # SELECTED may be "all", a single name, or a space-separated list.
            if [ "$EVENT" = "workflow_dispatch" ] && [ "$SELECTED" != "all" ]; then
              case " $SELECTED " in
                *" $name "*) : ;;   # explicitly selected — keep
                *) continue ;;      # not selected — skip
              esac
            fi

            version=$(yq ".${name}.version // \"\"" versions.yml)
            if [ -z "$version" ] || [ "$version" = "null" ]; then
              echo "  ${name}: no version in versions.yml — skip"
              continue
            fi

            path_major=$(module_major_from_cue "$name")
            ver_major="v${version#v}"; ver_major="${ver_major%%.*}"
            if [ "$path_major" != "$ver_major" ]; then
              echo "::error::${name}: module path major (${path_major}) != version major (${ver_major}). Bump module.cue path before publishing ${version}."
              exit 1
            fi

            if version_published "$name" "$version"; then
              echo "  ${name}@${version}: already on GHCR"
            else
              echo "  ${name}@${version}: unpublished"
              CHANGED="${CHANGED} ${name}"
            fi
          done
          CHANGED="${CHANGED# }"

          if [ -z "$CHANGED" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "Nothing to publish."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "changed=${CHANGED}" >> "$GITHUB_OUTPUT"
            echo "Will publish: ${CHANGED}"
          fi

      - name: Check formatting
        if: steps.check.outputs.has_changes == 'true'
        run: |
          set -euo pipefail
          # Print the cue binary matching a module's declared language.version.
          pick_cue() {
            local lv
            lv=$(sed -n '/^language:/,/}/{s/.*version:[[:space:]]*"\([^"]*\)".*/\1/p;}' "$1/cue.mod/module.cue" | head -1)
            case "$lv" in
              v0.17*|v0.18*|v0.19*) echo "$HOME/cuebin/next/cue" ;;
              *) echo "$HOME/cuebin/stable/cue" ;;
            esac
          }
          for name in ${{ steps.discover.outputs.modules }}; do
            cuebin="$(pick_cue "$name")"
            (cd "$name" && "$cuebin" fmt ./...)
          done
          if ! git diff --quiet; then
            echo "::error::CUE files are not formatted. Run 'cue fmt ./...' locally."
            git diff --name-only
            exit 1
          fi

      - name: Login to GHCR
        if: steps.check.outputs.has_changes == 'true'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Validate and publish modules
        if: steps.check.outputs.has_changes == 'true'
        id: publish
        run: |
          set -euo pipefail

          DRY_RUN="${{ inputs.dry_run || 'false' }}"
          CHANGED="${{ steps.check.outputs.changed }}"
          PUBLISHED=""

          # Print the cue binary matching a module's declared language.version.
          pick_cue() {
            local lv
            lv=$(sed -n '/^language:/,/}/{s/.*version:[[:space:]]*"\([^"]*\)".*/\1/p;}' "$1/cue.mod/module.cue" | head -1)
            case "$lv" in
              v0.17*|v0.18*|v0.19*) echo "$HOME/cuebin/next/cue" ;;
              *) echo "$HOME/cuebin/stable/cue" ;;
            esac
          }

          # Each module is validated/published independently so one failure
          # (e.g. a module whose catalog deps are not yet on GHCR) does not
          # abort the rest. Any failure is recorded and the job exits non-zero
          # at the end.
          FAILED=""
          for name in $CHANGED; do
            echo "=== ${name} ==="
            version=$(yq ".${name}.version" versions.yml)
            cuebin="$(pick_cue "$name")"
            echo "  cue: $("$cuebin" version | head -1)"

            if ! (
              cd "$name"
              echo "  vet..."
              "$cuebin" vet ./...

              test_out=$("$cuebin" vet -t test ./... 2>&1) && echo "  test: pass" || {
                if echo "$test_out" | grep -q 'tag "test" not used in any file'; then
                  echo "  test: skip (no tests)"
                else
                  echo "$test_out" >&2
                  echo "  tests failed"
                  exit 1
                fi
              }

              if [ "$DRY_RUN" = "true" ]; then
                echo "  publish: skipped (dry run)"
                exit 0
              fi

              echo "  publish: ${name}@${version}..."
              "$cuebin" mod publish "${version}"
            ); then
              echo "::error::${name}: validate/publish failed"
              FAILED="${FAILED} ${name}"
              continue
            fi

            [ "$DRY_RUN" = "true" ] || PUBLISHED="${PUBLISHED} ${name}:${version}"
          done

          PUBLISHED="${PUBLISHED# }"
          echo "published=${PUBLISHED}" >> "$GITHUB_OUTPUT"

          if [ -n "$FAILED" ]; then
            echo "::error::Failed modules:${FAILED}"
            exit 1
          fi

      - name: Tag published modules
        if: steps.check.outputs.has_changes == 'true' && inputs.dry_run != true
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          for entry in ${{ steps.publish.outputs.published }}; do
            name="${entry%%:*}"
            version="${entry##*:}"
            tag="modules/${name}/${version}"

            if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
              existing=$(git rev-parse "refs/tags/${tag}")
              head=$(git rev-parse HEAD)
              if [ "$existing" != "$head" ]; then
                echo "::error::${tag} already exists at ${existing}, but HEAD is ${head}. Refusing to move tag."
                exit 1
              fi
              echo "  ${tag}: already at HEAD"
            else
              git tag "${tag}"
              echo "  ${tag}: created"
            fi
            git push origin "refs/tags/${tag}"
          done

      - name: Pick release tag
        if: steps.check.outputs.has_changes == 'true' && inputs.dry_run != true
        id: release_tag
        run: |
          set -euo pipefail
          date="$(date -u +%Y-%m-%d)"
          base="release/${date}"
          git fetch origin --tags --quiet

          if ! git rev-parse -q --verify "refs/tags/${base}" >/dev/null; then
            tag="${base}"
            title="${date}"
          else
            n=2
            while git rev-parse -q --verify "refs/tags/${base}.${n}" >/dev/null; do
              n=$((n+1))
            done
            tag="${base}.${n}"
            title="${date} (rev ${n})"
          fi

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "title=${title}" >> "$GITHUB_OUTPUT"
          echo "date=${date}" >> "$GITHUB_OUTPUT"
          echo "Release: ${tag} — ${title}"

      - name: Build release notes
        if: steps.check.outputs.has_changes == 'true' && inputs.dry_run != true
        id: notes
        run: |
          set -euo pipefail

          CHANGED="${{ steps.check.outputs.changed }}"
          ALL="${{ steps.discover.outputs.modules }}"
          DATE="${{ steps.release_tag.outputs.date }}"

          is_changed() { echo " $CHANGED " | grep -q " $1 "; }

          prev_release=$(git tag -l 'release/*' --sort=-v:refname | grep -v "^${{ steps.release_tag.outputs.tag }}\$" | head -1 || true)

          {
            echo "## Modules (${DATE})"
            echo
            if [ -n "$CHANGED" ]; then
              changed_bold=""
              for n in $CHANGED; do changed_bold="${changed_bold}, **${n}**"; done
              echo "Changed this release: ${changed_bold#, }"
            else
              echo "Changed this release: _none_"
            fi
            echo
            if [ -n "$prev_release" ]; then
              echo "[Compare to previous release](https://github.com/${ORG}/${REPO}/compare/${prev_release}...${{ steps.release_tag.outputs.tag }})"
              echo
            fi
            echo "| Module | Version | Package |"
            echo "| --- | --- | --- |"
            for name in $ALL; do
              version=$(yq ".${name}.version // \"\"" versions.yml)
              [ -z "$version" ] || [ "$version" = "null" ] && continue

              tag_url="https://github.com/${ORG}/${REPO}/releases/tag/modules/${name}/${version}"
              pkg_url="https://github.com/orgs/${ORG}/packages/container/package/opmodel.dev%2Fmodules%2F${name}"

              if is_changed "$name"; then
                echo "| **${name}** | **[${version}](${tag_url})** | [ghcr](${pkg_url}) |"
              else
                echo "| ${name} | [${version}](${tag_url}) _(unchanged)_ | [ghcr](${pkg_url}) |"
              fi
            done
          } > release-notes.md

          echo "path=release-notes.md" >> "$GITHUB_OUTPUT"
          echo "--- release notes ---"
          cat release-notes.md

      - name: Create GitHub Release
        if: steps.check.outputs.has_changes == 'true' && inputs.dry_run != true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ steps.release_tag.outputs.tag }}"
          title="${{ steps.release_tag.outputs.title }}"

          git tag "${tag}"
          git push origin "refs/tags/${tag}"

          gh release create "${tag}" \
            --title "${title}" \
            --notes-file "${{ steps.notes.outputs.path }}" \
            --latest
