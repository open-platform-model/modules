global:
  variant: distroless

# Overrides for the `istiod-remote` dep
istiod:
  enabled: true
  profile: ambient

  # Platform node scheduling
  pilot:
    nodeSelector:
      node.ertia.io/platform: "true"
    tolerations:
      - key: "node-role.kubernetes.io/control-plane"
        operator: "Exists"
        effect: "NoSchedule"

    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 512Mi

    # ext_authz provider for oauth2-proxy integration
    meshConfig:
      extensionProviders:
        - name: oauth2-proxy
          envoyExtAuthzHttp:
            service: oauth2-proxy.oauth2-proxy.svc.cluster.local
            port: 80
            includeRequestHeadersInCheck:
              - cookie
            headersToUpstreamOnAllow:
              - authorization
              - x-auth-request-user
              - x-auth-request-email
              - x-auth-request-groups
            headersToDownstreamOnDeny:
              - set-cookie
              - location

# Overrides for the `ztunnel` dep
ztunnel:
  profile: ambient
  resourceName: ztunnel
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 256Mi

# Overrides for the `cni` dep
cni:
  profile: ambient
